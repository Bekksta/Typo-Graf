<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline';"
    />
  </head>
  <body>
    <script>
      // Единственная задача этого iframe — отдать navigator.language в
      // main-thread плагина. В Figma plugin sandbox такого API нет.
      // UI никогда не показывается (figma.showUI(..., { visible: false })).
      parent.postMessage(
        {
          pluginMessage: {
            type: "init",
            locale: navigator.language || "en",
          },
        },
        "*"
      );
    </script>
  </body>
</html>
